<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YYZL 速查系统</title>
<style>
  :root{
    --bg:#f4f1ea;          /* 米色背景 */
    --panel:#fbf9f4;       /* 面板 */
    --panel2:#f0ece2;      /* 次面板 */
    --line:#e0d9c9;        /* 分隔线 */
    --sage:#7c8a6e;        /* 鼠尾草绿 主色 */
    --sage-d:#5f6d54;      /* 深绿 */
    --sage-l:#e8ede1;      /* 浅绿底 */
    --text:#3a3a32;        /* 主文字 */
    --text2:#8a8678;       /* 次文字 */
    --a:#5a7d9a;           /* A员工气泡蓝 */
    --b:#fff;              /* B客户气泡白 */
    --warn:#b5654a;        /* 警示 */
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
    overflow:hidden;
  }
  /* ============ 登录页 ============ */
  #login{
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;z-index:100;
  }
  .login-box{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:36px 30px;width:320px;box-shadow:0 8px 30px rgba(124,138,110,.12);
  }
  .login-box h1{font-size:20px;color:var(--sage-d);text-align:center;margin-bottom:6px;letter-spacing:1px}
  .login-box .sub{text-align:center;color:var(--text2);font-size:12px;margin-bottom:24px}
  .login-box input,.login-box select{
    width:100%;padding:11px 13px;margin-bottom:14px;border:1px solid var(--line);
    border-radius:9px;font-size:15px;background:var(--panel2);color:var(--text);outline:none;
  }
  .login-box input:focus{border-color:var(--sage)}
  .login-box button{
    width:100%;padding:12px;background:var(--sage);color:#fff;border:none;
    border-radius:9px;font-size:15px;cursor:pointer;letter-spacing:2px;
  }
  .login-box button:active{background:var(--sage-d)}
  .login-err{color:var(--warn);font-size:12px;text-align:center;margin-top:10px;min-height:16px}
  /* ============ 主界面 ============ */
  #app{display:none;height:100%;flex-direction:column}
  .topbar{
    background:var(--sage);color:#fff;padding:10px 14px;
    display:flex;align-items:center;gap:10px;flex-shrink:0;
  }
  .topbar .title{font-size:15px;font-weight:600;letter-spacing:.5px}
  .topbar .who{font-size:12px;opacity:.9}
  .topbar .spacer{flex:1}
  .topbar select{
    background:var(--sage-d);color:#fff;border:1px solid rgba(255,255,255,.3);
    border-radius:7px;padding:5px 8px;font-size:12px;outline:none;max-width:130px;
  }
  .topbar .logout{
    background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);
    border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;
  }
  .body{flex:1;display:flex;overflow:hidden}
  /* 左侧外事号列表 */
  .sidebar{
    width:300px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;flex-shrink:0;
  }
  .search-wrap{padding:10px;border-bottom:1px solid var(--line)}
  .search-wrap input{
    width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
    background:var(--panel2);outline:none;font-size:13px;color:var(--text);
  }
  .search-wrap input:focus{border-color:var(--sage)}
  .acc-list{flex:1;overflow-y:auto}
  .dept-group{}
  .dept-head{
    padding:7px 14px;font-size:12px;color:var(--sage-d);background:var(--panel2);
    font-weight:600;position:sticky;top:0;border-bottom:1px solid var(--line);
  }
  .acc-item{
    padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;
    display:flex;align-items:center;gap:9px;
  }
  .acc-item:hover{background:var(--sage-l)}
  .acc-item.active{background:var(--sage-l);border-left:3px solid var(--sage)}
  .acc-avatar{
    width:34px;height:34px;border-radius:50%;background:var(--sage);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
  }
  .acc-info{flex:1;min-width:0}
  .acc-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acc-meta{font-size:11px;color:var(--text2)}
  /* 右侧对话区 */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--panel2)}
  .main-head{
    padding:11px 16px;background:var(--panel);border-bottom:1px solid var(--line);
    flex-shrink:0;display:flex;align-items:center;gap:10px;
  }
  .main-head .h-name{font-size:15px;font-weight:600}
  .main-head .h-meta{font-size:12px;color:var(--text2)}
  .content{flex:1;overflow-y:auto;padding:14px 16px}
  .empty{
    height:100%;display:flex;align-items:center;justify-content:center;
    color:var(--text2);font-size:14px;flex-direction:column;gap:10px;
  }
  /* 广告主块 */
  .adv-block{margin-bottom:20px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .adv-head{
    padding:9px 14px;background:var(--sage-l);font-size:13px;font-weight:600;color:var(--sage-d);
    border-bottom:1px solid var(--line);display:flex;justify-content:space-between;cursor:pointer;
  }
  .adv-head .cnt{font-size:11px;color:var(--text2);font-weight:400}
  .adv-msgs{padding:10px 14px;display:none}
  .adv-msgs.open{display:block}
  .msg{margin-bottom:9px;display:flex;flex-direction:column;max-width:78%}
  .msg.A{align-self:flex-end;margin-left:auto;align-items:flex-end}
  .msg.B{align-self:flex-start;align-items:flex-start}
  .msg .bubble{
    padding:7px 11px;border-radius:11px;font-size:13px;word-break:break-word;white-space:pre-wrap;
  }
  .msg.A .bubble{background:var(--a);color:#fff;border-bottom-right-radius:3px}
  .msg.B .bubble{background:#fff;border:1px solid var(--line);border-bottom-left-radius:3px}
  .msg .time{font-size:10px;color:var(--text2);margin-top:2px}
  .msg-flex{display:flex;flex-direction:column}
  /* 搜索结果 */
  .search-res{padding:4px 0}
  .sr-item{
    background:var(--panel);border:1px solid var(--line);border-radius:9px;
    padding:10px 13px;margin-bottom:9px;
  }
  .sr-top{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;gap:8px;flex-wrap:wrap}
  .sr-tag{background:var(--sage-l);color:var(--sage-d);padding:1px 7px;border-radius:5px}
  .sr-content{font-size:13px;color:var(--text);white-space:pre-wrap;word-break:break-word}
  .sr-content mark{background:#f3e0a0;padding:0 2px;border-radius:2px}
  .loading{text-align:center;color:var(--text2);padding:30px;font-size:13px}
  /* 滚动条 */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}
  /* 移动端 */
  @media(max-width:680px){
    .sidebar{width:100%;position:absolute;inset:0;z-index:5;transition:transform .2s}
    .sidebar.hide{transform:translateX(-100%)}
    .main{width:100%}
    .back-btn{display:inline-block!important}
  }
  .back-btn{display:none;background:var(--panel2);border:1px solid var(--line);
    border-radius:7px;padding:4px 9px;font-size:12px;cursor:pointer;color:var(--text)}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login">
  <div class="login-box">
    <h1>YYZL 速查系统</h1>
    <div class="sub">数据库版 · 秒级查询</div>
    <input id="lg-user" placeholder="监察员名(如:季霖)" autocomplete="off">
    <input id="lg-pass" type="password" placeholder="密码" value="">
    <button onclick="doLogin()">登 录</button>
    <div class="login-err" id="lg-err"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div class="topbar">
    <span class="title">YYZL 速查</span>
    <span class="who" id="who"></span>
    <span class="spacer"></span>
    <select id="viewAs" style="display:none" onchange="switchView()"></select>
    <button class="logout" onclick="logout()">退出</button>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar">
      <div class="search-wrap">
        <input id="searchBox" placeholder="🔍 搜索对话内容…" onkeydown="if(event.key==='Enter')doSearch()">
      </div>
      <div class="acc-list" id="accList"></div>
    </div>
    <div class="main">
      <div class="main-head">
        <button class="back-btn" onclick="showSidebar()">‹ 返回</button>
        <div>
          <div class="h-name" id="mainName">请选择外事号</div>
          <div class="h-meta" id="mainMeta"></div>
        </div>
      </div>
      <div class="content" id="content">
        <div class="empty">
          <div style="font-size:38px">💬</div>
          <div>从左侧选择一个外事号查看对话</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// API 地址 = 当前网页同源(因为网页和API都在VPS同一个服务上)
const API = "";   // 同源,留空即可

let STATE = {user:"", isLeader:false, viewAs:"", accounts:[]};

function api(path){ return API + path; }

// ====== 登录 ======
async function doLogin(){
  const user = document.getElementById('lg-user').value.trim();
  const pass = document.getElementById('lg-pass').value;
  const err = document.getElementById('lg-err');
  err.textContent = "";
  if(!user){ err.textContent="请输入监察员名"; return; }
  try{
    const r = await fetch(api('/api/login'), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    if(!r.ok){
      const e = await r.json();
      err.textContent = e.detail || "登录失败";
      return;
    }
    const d = await r.json();
    STATE.user = d.username;
    STATE.isLeader = d.is_leader;
    STATE.viewAs = d.username;
    enterApp();
  }catch(e){ err.textContent = "连接失败: "+e.message; }
}

async function enterApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('who').textContent = "· " + STATE.user + (STATE.isLeader?" (组长)":"");
  // 组长:加载同事下拉
  if(STATE.isLeader){
    const sel = document.getElementById('viewAs');
    sel.style.display='inline-block';
    try{
      const r = await fetch(api('/api/teammates?username='+encodeURIComponent(STATE.user)));
      const d = await r.json();
      let opts = `<option value="${STATE.user}">我自己(${STATE.user})</option>`;
      (d.teammates||[]).forEach(t=>{ opts += `<option value="${t}">${t}</option>`; });
      sel.innerHTML = opts;
    }catch(e){}
  }
  loadSkeleton();
}

function switchView(){
  STATE.viewAs = document.getElementById('viewAs').value;
  loadSkeleton();
  document.getElementById('content').innerHTML =
    '<div class="empty"><div style="font-size:38px">💬</div><div>已切换到 '+STATE.viewAs+'</div></div>';
  document.getElementById('mainName').textContent="请选择外事号";
  document.getElementById('mainMeta').textContent="";
}

// ====== 外事号列表(骨架) ======
async function loadSkeleton(){
  const list = document.getElementById('accList');
  list.innerHTML = '<div class="loading">加载中…</div>';
  try{
    const url = api('/api/skeleton?username='+encodeURIComponent(STATE.user)+'&view_as='+encodeURIComponent(STATE.viewAs));
    const r = await fetch(url);
    if(!r.ok){ list.innerHTML='<div class="loading">加载失败</div>'; return; }
    const d = await r.json();
    STATE.accounts = d.accounts||[];
    renderAccList(STATE.accounts);
  }catch(e){ list.innerHTML='<div class="loading">连接失败</div>'; }
}

function renderAccList(accounts){
  const list = document.getElementById('accList');
  if(!accounts.length){ list.innerHTML='<div class="loading">暂无外事号</div>'; return; }
  // 按部门分组
  const groups = {};
  accounts.forEach(a=>{ (groups[a.dept]=groups[a.dept]||[]).push(a); });
  let html = "";
  Object.keys(groups).forEach(dept=>{
    html += `<div class="dept-group"><div class="dept-head">${esc(dept)} (${groups[dept].length})</div>`;
    groups[dept].forEach(a=>{
      const ch = (a.account_name||'?').trim().charAt(0);
      html += `<div class="acc-item" data-id="${a.id}" onclick="openAccount(${a.id}, this)">
        <div class="acc-avatar">${esc(ch)}</div>
        <div class="acc-info">
          <div class="acc-name">${esc(a.account_name)}</div>
          <div class="acc-meta">${a.adv_count} 个广告主</div>
        </div></div>`;
    });
    html += `</div>`;
  });
  list.innerHTML = html;
}

// ====== 打开外事号:看广告主+消息 ======
async function openAccount(id, el){
  document.querySelectorAll('.acc-item').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  hideSidebar();
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">加载对话中…</div>';
  try{
    const r = await fetch(api('/api/advertisers?account_id='+id));
    if(!r.ok){ content.innerHTML='<div class="loading">加载失败</div>'; return; }
    const d = await r.json();
    document.getElementById('mainName').textContent = d.account.account_name;
    document.getElementById('mainMeta').textContent = d.account.dept + ' · ' + d.advertisers.length + ' 个广告主';
    renderAdvertisers(d.advertisers);
  }catch(e){ content.innerHTML='<div class="loading">连接失败</div>'; }
}

function renderAdvertisers(advs){
  const content = document.getElementById('content');
  if(!advs.length){ content.innerHTML='<div class="empty"><div>该外事号暂无广告主数据</div></div>'; return; }
  let html = "";
  advs.forEach((ad,i)=>{
    const open = i===0 ? 'open' : '';   // 第一个默认展开
    html += `<div class="adv-block">
      <div class="adv-head" onclick="toggleAdv(this)">
        <span>${esc(ad.adv_name)}</span>
        <span class="cnt">${ad.messages.length} 条 ▾</span>
      </div>
      <div class="adv-msgs ${open}"><div class="msg-flex">`;
    ad.messages.forEach(m=>{
      const cls = m.sender==='A' ? 'A' : 'B';
      html += `<div class="msg ${cls}">
        <div class="bubble">${esc(m.content)}</div>
        <div class="time">${fmtTime(m.msg_time)}</div>
      </div>`;
    });
    html += `</div></div></div>`;
  });
  content.innerHTML = html;
}

function toggleAdv(head){
  const msgs = head.nextElementSibling;
  msgs.classList.toggle('open');
}

// ====== 搜索 ======
async function doSearch(){
  const q = document.getElementById('searchBox').value.trim();
  if(!q){ loadSkeleton(); return; }
  const content = document.getElementById('content');
  hideSidebar();
  content.innerHTML = '<div class="loading">搜索中…</div>';
  document.getElementById('mainName').textContent = '搜索:'+q;
  document.getElementById('mainMeta').textContent = '';
  try{
    const url = api('/api/search?username='+encodeURIComponent(STATE.user)
      +'&view_as='+encodeURIComponent(STATE.viewAs)+'&q='+encodeURIComponent(q));
    const r = await fetch(url);
    const d = await r.json();
    document.getElementById('mainMeta').textContent = '共 '+d.count+' 条结果';
    if(!d.results.length){ content.innerHTML='<div class="empty"><div>没有找到包含「'+esc(q)+'」的对话</div></div>'; return; }
    let html = '<div class="search-res">';
    d.results.forEach(m=>{
      html += `<div class="sr-item">
        <div class="sr-top">
          <span class="sr-tag">${esc(m.account_name)}</span>
          <span>${esc(m.dept)}</span>
          <span>${esc(m.adv_name||'')}</span>
          <span>${m.sender==='A'?'员工':'客户'}</span>
          <span>${fmtTime(m.msg_time)}</span>
        </div>
        <div class="sr-content">${hl(m.content, q)}</div>
      </div>`;
    });
    html += '</div>';
    content.innerHTML = html;
  }catch(e){ content.innerHTML='<div class="loading">搜索失败</div>'; }
}

// ====== 工具 ======
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function hl(s, q){ s=esc(s); const qq=esc(q); if(!qq) return s; try{ return s.replace(new RegExp(qq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>'<mark>'+m+'</mark>'); }catch(e){ return s; } }
function fmtTime(t){ if(!t) return ''; return String(t).replace('T',' ').slice(0,16); }
function logout(){ location.reload(); }
function hideSidebar(){ if(window.innerWidth<=680) document.getElementById('sidebar').classList.add('hide'); }
function showSidebar(){ document.getElementById('sidebar').classList.remove('hide'); }

// 回车登录
document.getElementById('lg-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('lg-user').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('lg-pass').focus(); });
</script>
</body>
</html>
